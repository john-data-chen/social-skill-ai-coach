<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500" width="800" height="500">
  <!-- Background -->
  <rect width="100%" height="100%" fill="#f8fafc" rx="8" />
  
  <!-- Title -->
  <text x="400" y="40" font-family="sans-serif" font-size="24" font-weight="bold" text-anchor="middle" fill="#0f172a">Social Skills AI Coach Architecture</text>

  <!-- Agent Skill Box -->
  <rect x="250" y="80" width="300" height="80" fill="#e0f2fe" stroke="#0284c7" stroke-width="2" rx="8" />
  <text x="400" y="110" font-family="sans-serif" font-size="16" font-weight="bold" text-anchor="middle" fill="#0369a1">Agent Skill Curriculum</text>
  <text x="400" y="135" font-family="sans-serif" font-size="12" text-anchor="middle" fill="#0369a1">skills/social-skills-coach/ (SKILL.md + references)</text>
  <text x="400" y="150" font-family="sans-serif" font-size="12" text-anchor="middle" fill="#0369a1">Single Source of Truth</text>

  <!-- Arrows from Skill -->
  <path d="M 320 160 L 320 220 L 200 220 L 200 260" fill="none" stroke="#64748b" stroke-width="2" marker-end="url(#arrow)" />
  <path d="M 480 160 L 480 220 L 600 220 L 600 260" fill="none" stroke="#64748b" stroke-width="2" marker-end="url(#arrow)" />

  <!-- MCP Server Box -->
  <rect x="50" y="260" width="300" height="120" fill="#fef08a" stroke="#ca8a04" stroke-width="2" rx="8" />
  <text x="200" y="290" font-family="sans-serif" font-size="16" font-weight="bold" text-anchor="middle" fill="#854d0e">MCP Server (/api/mcp)</text>
  <text x="200" y="315" font-family="sans-serif" font-size="12" text-anchor="middle" fill="#854d0e">Exposes curriculum as MCP Tools</text>
  <text x="200" y="335" font-family="sans-serif" font-size="12" text-anchor="middle" fill="#854d0e">and 4 coaching agents as Prompts</text>
  <text x="200" y="355" font-family="sans-serif" font-size="12" text-anchor="middle" fill="#854d0e">For ANY external MCP Client</text>

  <!-- Next.js Orchestrator Box -->
  <rect x="450" y="260" width="300" height="160" fill="#dcfce7" stroke="#16a34a" stroke-width="2" rx="8" />
  <text x="600" y="290" font-family="sans-serif" font-size="16" font-weight="bold" text-anchor="middle" fill="#14532d">Web App (/api/chat)</text>
  <text x="600" y="315" font-family="sans-serif" font-size="12" text-anchor="middle" fill="#14532d">Next.js Orchestrator + 4 Agents</text>
  <text x="600" y="340" font-family="sans-serif" font-size="12" text-anchor="middle" fill="#14532d">1. Analyzer: Structures situation</text>
  <text x="600" y="360" font-family="sans-serif" font-size="12" text-anchor="middle" fill="#14532d">2. Coach: RAG grounded advice</text>
  <text x="600" y="380" font-family="sans-serif" font-size="12" text-anchor="middle" fill="#14532d">3. Roleplay: Interactive practice</text>
  <text x="600" y="400" font-family="sans-serif" font-size="12" text-anchor="middle" fill="#14532d">4. Reflection: Rubric evaluation</text>

  <!-- External Client -->
  <rect x="50" y="420" width="300" height="40" fill="#f1f5f9" stroke="#475569" stroke-width="2" stroke-dasharray="4" rx="8" />
  <text x="200" y="445" font-family="sans-serif" font-size="14" text-anchor="middle" fill="#334155">Claude Desktop / MCP Inspector</text>
  
  <path d="M 200 380 L 200 420" fill="none" stroke="#64748b" stroke-width="2" marker-end="url(#arrow)" />

  <!-- Definitions -->
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#64748b" />
    </marker>
  </defs>
</svg>
